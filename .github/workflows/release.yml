name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build - ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: cinephile-linux-x86_64
            archive_format: tar.gz
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: cinephile-macos-x86_64
            archive_format: tar.gz
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: cinephile-macos-aarch64
            archive_format: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: cinephile-windows-x86_64
            archive_format: zip

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Protoc (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Install Protoc (macOS)
        if: runner.os == 'macOS'
        run: brew install protobuf

      - name: Install Protoc (Windows)
        if: runner.os == 'Windows'
        run: choco install protoc

      - name: Build Binary
        run: cargo build --release --target ${{ matrix.target }} -p cinephile_cli

      - name: Package Binary
        shell: bash
        run: |
          mkdir -p dist
          BIN_PATH="target/${{ matrix.target }}/release/cinephile"
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            BIN_PATH="${BIN_PATH}.exe"
            cp "$BIN_PATH" "dist/cinephile.exe"
            # Copy all DLLs generated by ort/copy-dlls
            cp target/${{ matrix.target }}/release/*.dll dist/ 2>/dev/null || true
            cd dist && 7z a "../${{ matrix.artifact_name }}.zip" *
          else
            cp "$BIN_PATH" "dist/cinephile"
            cp README.md dist/
            # Copy all dylibs generated by ort/copy-dlls
            cp target/${{ matrix.target }}/release/*.dylib dist/ 2>/dev/null || true
            cd dist && tar -czf "../${{ matrix.artifact_name }}.tar.gz" *
          fi

      - name: Upload Build Artifacts (to Actions)
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_name }}.${{ matrix.archive_format }}

  publish:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
